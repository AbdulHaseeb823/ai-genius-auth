$kind: http-request
name: Free Model
method: GET
url: '{{baseUrl}}/api/ai/free-model'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Response has model field", () => pm.expect(json).to.have.property("model"));
      pm.test("Model is free version", () => pm.expect(json.model).to.eql("ai-genius-free-v1"));
